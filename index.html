<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון מדבקות רז</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { color: #1a73e8; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .result { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; color: #1967d2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>מחשבון מדבקות 📏</h2>
        <label>אורך המדף (ס"מ):</label>
        <input type="number" id="shelf" value="172" oninput="calculate()">
        
        <label>רוחב המדבקה (ס"מ):</label>
        <input type="number" id="sticker" value="20" oninput="calculate()">
        
        <div class="result" id="res"></div>
    </div>

    <script>
        function calculate() {
            const s = document.getElementById('shelf').value;
            const t = document.getElementById('sticker').value;
            if(s && t) {
                const count = Math.floor(s / t);
                const rem = s % t;
                document.getElementById('res').innerHTML = 
                    `כמות מדבקות: ${count}<br>שארית בצד: ${rem.toFixed(1)} ס"מ`;
            }
        }
        calculate(); // הרצה ראשונית
    </script>
</body>
</html>
